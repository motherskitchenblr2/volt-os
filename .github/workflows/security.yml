name: Security
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
        continue-on-error: false

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          if grep -rn "sk-\|ghp_\|AKIA\|api_key\|apiKey\|secret.*=.*['\"]" \
            --include="*.ts" --include="*.js" --include="*.json" \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.git \
            --exclude="*.test.ts" --exclude="*.example" --exclude="*.env.example" \
            . 2>/dev/null; then
            echo "⚠️ Potential secrets found — review above output"
            exit 1
          fi
          echo "✅ No secrets found"

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check for copyleft licenses
        run: |
          echo "Checking dependency licenses..."
          npx license-checker --production --failOn "GPL-3.0;AGPL-3.0;SSPL-1.0" || {
            echo "❌ Copyleft license found in production dependencies"
            exit 1
          }
          echo "✅ No copyleft licenses in production dependencies"
        continue-on-error: true
